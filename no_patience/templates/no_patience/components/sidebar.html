{% extends 'no_patience/base.html' %}
{% load static %}

{% block content %}
  <!-- sidebar component -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <form action="{% url 'no_patience:reload' chat_id=chat.id new_chat_query=1 %}" method="post">
        {% csrf_token %}
        <button name="submit" class="new-chat-btn" id="newChatBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New Chat
        </button>
      </form>
    </div>
    
    <div class="sidebar-content">
      <div class="chat-history">
        <div class="history-section">
          {% for chat in chats %}
            <form action="{% url 'no_patience:reload' chat_id=chat.id new_chat_query=0 %}" method="post">
              {% csrf_token %}
              <button class="chat-item active">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <div class="chat-item-meta">
                  <span class="chat-item-name">{{ chat.name }}</span>
                  <span class="chat-item-date" data-utc="{{ chat.date_added|date:'c' }}">{{ chat.date_added|date:"M j" }}</span>
                </div>
              </button>
            </form>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>


  <script>
    const overlay = document.getElementById('sidebarOverlay');
    if (overlay) {
      overlay.addEventListener('click', function() {
        toggleSidebar();
      });
    }

    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');
      if (sidebar && overlay) {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      }
    }

    // convert utc to local for sidebar info
    document.querySelectorAll('.chat-item-date[data-utc]').forEach(function(el) {
      var d = new Date(el.dataset.utc);
      if (!isNaN(d)) {
        var now = new Date();
        var isToday = d.toDateString() === now.toDateString();
        el.textContent = isToday
          ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : d.toLocaleDateString([], { month: 'short', day: 'numeric' });
      }
    });
  </script>
{% endblock content %}
