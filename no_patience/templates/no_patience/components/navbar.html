{% extends "no_patience/base.html" %}
{% load static %}

{% block content %}
  <nav class="navbar">
    <div
      class="nav-container"
      onmousedown="return false;"
      onselectstart="return false;"
    >
      <button class="hamburger" id="hamburger">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <div class="chat-name" id="chatName">{{ chat_name }}</div>

      <div class="profile-wrapper">
        <div class="profile-icon" id="profileIcon">{{ user.username|first|upper }}</div>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="dropdown-user-info">
            <span class="dropdown-display-name">{{ user.get_full_name|default:user.username }}</span>
            <span class="dropdown-username">@{{ user.username }}</span>
          </div>
          <form action="{% url 'accounts:logout' %}" method="post" class="dropdown-logout-form">
            {% csrf_token %}
            <button type="submit" class="dropdown-logout-btn">Log out</button>
          </form>
        </div>
      </div>
    </div>
  </nav>

  <script>
    const hamburger = document.getElementById("hamburger");
    hamburger.addEventListener('click', toggleSidebar);

    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');
      if (sidebar && overlay) {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      }
    }

    const profileIcon = document.getElementById('profileIcon');
    const profileDropdown = document.getElementById('profileDropdown');
    const sidebarOverlay = document.querySelector('.sidebar-overlay');

    if (profileIcon) {
      profileIcon.addEventListener('click', function(e) {
        e.stopPropagation();
        profileDropdown.classList.toggle('open');
      });
    }

    document.addEventListener('click', function(e) {
      if (profileDropdown && !profileDropdown.contains(e.target) && e.target !== profileIcon) {
        profileDropdown.classList.remove('open');
      }
    });
  </script>
{% endblock content %}
