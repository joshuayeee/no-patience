{% extends 'no_patience/base.html' %}
{% load static %}

{% block content %}
  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Sign Up - No Patience</title>
      <link rel="stylesheet" href="{% static 'css/signup.css' %}" />
    </head>
    <body>
      <div class="signup-container">
        <img src="{% static 'images/no-patience-logo-no-bg.png' %}" alt="No Patience" class="signup-logo" />
        <h2>No Patience</h2>
        <h3>Create your account</h3>
        <form action="{% url 'accounts:register' %}" method='post' class="register-form">
          {% csrf_token %}
          {{ form.as_div }}
          <button type="submit" class="register-submit">Create Account</button>
        </form>
        <div class="login-link">
          <p>Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
        </div>
      </div>
    </body>
  </html>
{% endblock content %}
